logging.directory=logs
logging.classes=false
logging.debug=false
logging.level=WARN
logging.disableShadowStackLogging=true
logging.disableSymbolicExecutionLogging=true
logging.toConsole=false
logging.invocations=true
logging.formulaLength=100

explorer.host=localhost
explorer.port=8078
explorer.traceURI=constraints/submit
explorer.branchCoveragePath=branch-coverage/submit
explorer.instrCoveragePath=instr-coverage/submit

instrumentation.checkClassAdapter=false
instrumentation.dispatcher=de.uzl.its.swat.symbolic.SymbolicInstructionDispatcher
instrumentation.prefix=SWAT
instrumentation.excludePackages=org/springframework/boot/loader:de/uzl/its/swat:de/uzl/its/symbolic:com/intellij:com/fasterxml:sun:jdk:org/h2:org/sosy_lab:java:javax:com/sun:org/apache:com/microsoft:com/google:org/w3c:org/jcp:org/objectweb/asm:apple/security:org/slf4j:shadow
instrumentation.instructionIds=true
instrumentation.transformer=SV_COMP

exitOnError=true
coverageType=NONE
coverageOnly=false
constraintsOnly=false

solver.mode=HTTP

svcomp.randomInputs=false
