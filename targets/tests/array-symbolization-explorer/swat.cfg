# SWAT Configuration for Array Symbolization with Explorer

# Logging
logging.directory=logs
logging.classes=true
logging.debug=true
logging.toConsole=true

# Explorer connection
explorer.host=localhost
explorer.port=8078

# Instrumentation
instrumentation.transformer=ANNOTATION
instrumentation.includePackages=de/uzl/its/tests/arrays

# Solver - HTTP mode to work with explorer
solver.mode=HTTP
