 */

plugins {
    // Apply the groovy plugin to also add support for Groovy (needed for Spock)
    id 'groovy'
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use the latest Groovy version for Spock testing
    testImplementation "org.apache.groovy:groovy:4.0.27"
    // Use the awesome Spock testing and specification framework even with Java
    testImplementation "org.spockframework:spock-core:2.3-groovy-4.0"
    testImplementation "junit:junit:4.13.2"

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    implementation project(':annotations')
    implementation("org.optaplanner:optaplanner-core:10.1.0")
    implementation("org.optaplanner:optaplanner-constraint-streams-drools:10.1.0")
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    manifest {
        attributes(
                "Implementation-Title": "optaplanner-poj",
                "Implementation-Version": "1.0",
                "Main-Class": "org.example.App"
        )
    }
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

shadowJar {
    archiveBaseName.set(project.name)
    archiveVersion.set("1.0")

    zip64 = true
    duplicatesStrategy = DuplicatesStrategy.INCLUDE

    // merge META-INF/services files so ServiceLoader works
    mergeServiceFiles()

    // Exclude signature files
    exclude 'META-INF/*.RSA', 'META-INF/*.SF', 'META-INF/*.DSA'
}

// make the normal 'build' produce the shaded jar
tasks.named('build') {
    dependsOn tasks.named('shadowJar')
}
