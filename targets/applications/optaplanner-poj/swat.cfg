coverageOnly=false
constraintsOnly=true
coverageType=TRACE

logging.debug=true
logging.classes=true
logging.toConsole=true
logging.level=debug
logging.disableShadowStackLogging=false
logging.disableSymbolicExecutionLogging=false

instrumentation.transformer=ANNOTATION
