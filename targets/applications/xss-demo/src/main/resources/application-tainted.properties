# MySQL Database Configuration (Docker) with Tainting
spring.datasource.url=jdbc:tubs:mysql://localhost:3306/xss_demo?createDatabaseIfNotExist=true

spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.sap.fontus.sql.driver.tubsDriver

# Disable Hibernate DDL and SQL initialization
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.sql.init.mode=never

# Server Configuration
server.port=8080 

# Tomcat JDBC Configuration for Fontus compatibility
spring.datasource.tomcat.use-statement-facade=false

