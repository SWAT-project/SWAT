plugins {
    id 'org.springframework.boot' version '3.5.5'
    id 'java'
}

group = 'de.uzl.its.targets'
version = '0.0.1-SNAPSHOT'

description = "Artificial examples for SWAT"

def javaVer = JavaVersion.VERSION_17
java {
    sourceCompatibility = javaVer
    targetCompatibility = javaVer
}


repositories {
    mavenCentral()
}

dependencies {
    implementation platform('org.springframework.boot:spring-boot-dependencies:3.5.5')

    implementation 'org.springframework.boot:spring-boot-starter-web'
    // implementation 'org.springframework.boot:spring-boot-starter-test'
    // implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    // implementation 'org.springframework.boot:spring-boot-starter-validation'
    // https://github.com/spring-projects/spring-boot/issues/39753
    // jakarta.persistence-api:3.1.0 seems to be the most recent supported version
    // implementation 'jakarta.persistence:jakarta.persistence-api:3.1.0'
    // implementation 'jakarta.annotation:jakarta.annotation-api:3.0.0'
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.13'
    // implementation 'mysql:mysql-connector-java:8.0.33'
}

jar {
    manifest {
        attributes 'Main-Class': 'de.uzl.its.targets.artificial.target1.Target1Application'
    }
}

task enforceJavaVersion {
    doLast {
        def activeJavaVersion = JavaVersion.current()
        if(activeJavaVersion != javaVer) {
            throw new IllegalStateException("Wrong active Java version; Found: "
                    + activeJavaVersion + " Required: " + javaVer)
        }
    }
}

compileJava.dependsOn(enforceJavaVersion)

bootRun {
    // Default profile will be used if no profile is specified
    systemProperty "spring.profiles.active", "default"
}
