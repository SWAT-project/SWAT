server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:tcp://localhost:${database.port}/mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: "passwd_secure!"
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath*:schema.sql
      # data-locations: data.sql
logging:
  level:
    root: INFO
    de.uzl.its.targets.finance: INFO
