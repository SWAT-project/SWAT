server:
  port: 8081
spring:
  datasource:
    url: jdbc:h2:mem:mydb
    # username: sa
    # password:
    driverClassName: org.h2.Driver
    # continue-on-error: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false
