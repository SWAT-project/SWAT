coverageOnly=false
constraintsOnly=true
coverageType=TRACE
useAbortTimer=true
abortTimerValInMS=10000

logging.debug=true
logging.classes=true
logging.toConsole=true
logging.level=debug
logging.disableShadowStackLogging=true
logging.disableSymbolicExecutionLogging=false

instrumentation.transformer=SPRING_ENDPOINT
instrumentation.includePackages=org/restncs
instrumentation.instructionIds=true
instrumentation.checkClassAdapter=false
instrumentation.useDataEndpointAdapter=false

solver.mode=LOCAL

explorer.host=localhost
explorer.port=8078
